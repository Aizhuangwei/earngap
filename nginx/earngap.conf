# EarnGap Nginx Configuration
# Ubuntu 22.04 / Cloudflare SSL

upstream earngap_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream earngap_backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name earngap.com www.earngap.com api.earngap.com;
    return 301 https://$server_name$request_uri;
}

# 主站 (Next.js)
server {
    listen 443 ssl http2;
    server_name earngap.com www.earngap.com;

    ssl_certificate /etc/letsencrypt/live/earngap.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/earngap.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源缓存
    location /_next/static {
        proxy_pass http://earngap_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /static {
        proxy_pass http://earngap_frontend;
        expires 30d;
    }

    # API 代理
    location /api/ {
        proxy_pass http://earngap_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass http://earngap_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # 主站流量
    location / {
        proxy_pass http://earngap_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 日志
    access_log /var/log/nginx/earngap-access.log;
    error_log /var/log/nginx/earngap-error.log;
}

# API 子域名
server {
    listen 443 ssl http2;
    server_name api.earngap.com;

    ssl_certificate /etc/letsencrypt/live/earngap.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/earngap.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health check (internal only)
    location /health {
        proxy_pass http://earngap_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location / {
        proxy_pass http://earngap_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://earngap_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    access_log /var/log/nginx/earngap-api-access.log;
    error_log /var/log/nginx/earngap-api-error.log;
}
